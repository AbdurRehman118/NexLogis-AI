# NexLogis AI - Docker Compose Configuration
# To switch environments, update the env_file paths below or use:
# docker-compose --env-file api/.env.production up
version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file:
      - ./api/.env
    ports:
      - "${BACKEND_PORT:-8000}:80"
    volumes:
      - ./api:/app/api
    environment:
      - ENV=development

  web_app:
    build:
      context: .
      dockerfile: web_app/Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    env_file:
      - ./web_app/.env
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - api
